<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Battle — ホスト</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; padding: 2rem; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
.header-label { font-size: 13px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
.header-status { font-size: 13px; color: #888; }
.header-status span { color: #4ade80; }
.screen { display: none; }
.screen.active { display: block; }

/* waiting */
.waiting { text-align: center; padding: 3rem 1rem; }
.waiting h1 { font-size: 48px; font-weight: 600; margin-bottom: 0.5rem; }
.waiting p { font-size: 18px; color: #aaa; margin-bottom: 2rem; }
.player-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 640px; margin: 0 auto 2rem; }
.player-chip { background: #1e1e1e; border: 0.5px solid #333; border-radius: 100px; padding: 7px 14px; font-size: 13px; color: #ddd; }

/* question */
.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.q-num { font-size: 13px; color: #666; }
.q-category { font-size: 12px; background: #1e1e1e; border: 0.5px solid #333; border-radius: 100px; padding: 4px 12px; color: #aaa; }
.timer { font-size: 80px; font-weight: 600; text-align: center; line-height: 1; margin: 1rem 0; transition: color 0.3s; }
.question-text { font-size: 28px; font-weight: 500; text-align: center; line-height: 1.5; margin-bottom: 1.5rem; max-width: 700px; margin-left: auto; margin-right: auto; }
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 700px; margin: 0 auto 1.5rem; }
.choice { background: #1e1e1e; border: 0.5px solid #333; border-radius: 12px; padding: 16px 18px; font-size: 18px; display: flex; align-items: center; gap: 12px; transition: background 0.2s, border-color 0.2s; }
.choice.correct { background: #14532d; border-color: #4ade80; }
.choice.wrong { opacity: 0.3; }
.choice-label { width: 32px; height: 32px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.choice.correct .choice-label { background: #4ade80; color: #000; }
.answer-bar { max-width: 700px; margin: 0 auto 1.5rem; }
.answer-bar-labels { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-bottom: 6px; }
.answer-bar-track { height: 6px; background: #1e1e1e; border-radius: 3px; overflow: hidden; }
.answer-bar-fill { height: 100%; background: #185FA5; border-radius: 3px; transition: width 0.4s; }
.explanation { max-width: 700px; margin: 0 auto 1.5rem; background: #1e1e1e; border-radius: 8px; padding: 14px 18px; font-size: 14px; color: #aaa; line-height: 1.7; }

/* leaderboard */
.lb { max-width: 560px; margin: 0 auto; }
.lb-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: #1e1e1e; border-radius: 8px; margin-bottom: 8px; }
.lb-rank { font-size: 18px; font-weight: 600; width: 28px; text-align: center; color: #888; }
.lb-rank.r1 { color: #fbbf24; }
.lb-rank.r2 { color: #94a3b8; }
.lb-rank.r3 { color: #cd7c2f; }
.lb-name { flex: 1; font-size: 15px; }
.lb-score { font-size: 18px; font-weight: 600; color: #4ade80; }
.winner { text-align: center; margin-bottom: 2rem; }
.winner-label { font-size: 13px; color: #666; margin-bottom: 0.25rem; }
.winner-name { font-size: 40px; font-weight: 600; margin-bottom: 0.25rem; }
.winner-score { font-size: 28px; color: #4ade80; }

/* controls */
.controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
.btn { background: #185FA5; color: #fff; border: none; border-radius: 8px; padding: 13px 32px; font-size: 15px; font-weight: 500; cursor: pointer; }
.btn:disabled { background: #333; color: #666; cursor: default; }
.btn.secondary { background: #1e1e1e; border: 0.5px solid #444; }

/* key input */
.key-screen { max-width: 400px; margin: 6rem auto; text-align: center; }
.key-screen h2 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
.key-screen p { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
.key-input { width: 100%; background: #1e1e1e; border: 0.5px solid #444; border-radius: 8px; padding: 12px 14px; font-size: 16px; color: #fff; outline: none; text-align: center; letter-spacing: 0.1em; font-family: monospace; margin-bottom: 10px; }
.key-input:focus { border-color: #185FA5; }
.err { font-size: 13px; color: #ef4444; margin-top: 8px; min-height: 20px; }
</style>
</head>
<body>

<div id="screen-key" class="screen active">
  <div class="key-screen">
    <h2>ホスト認証</h2>
    <p>スプレッドシートで発行したホストキーを入力してください</p>
    <input class="key-input" id="key-input" type="text" placeholder="XXXXXXXX" maxlength="8">
    <button class="btn" style="width:100%" onclick="verifyKey()">入室する</button>
    <div class="err" id="key-err"></div>
  </div>
</div>

<div id="screen-waiting" class="screen">
  <div class="header">
    <span class="header-label">Quiz Battle — ホスト</span>
    <span class="header-status">参加者待機中</span>
  </div>
  <div class="waiting">
    <h1>クイズバトル</h1>
    <p>参加者の入室を確認してからスタートしてください</p>
    <div class="player-grid" id="player-grid"></div>
    <button class="btn" onclick="hostStart()">ゲームスタート</button>
  </div>
</div>

<div id="screen-question" class="screen">
  <div class="header">
    <span class="header-label" id="q-label">問題 1 / 5</span>
    <span class="header-status">回答済み <span id="ans-count">0</span>人</span>
  </div>
  <div class="q-meta">
    <span class="q-num" id="q-num">Q1</span>
    <span class="q-category" id="q-category"></span>
  </div>
  <div class="timer" id="timer">15</div>
  <div class="question-text" id="question-text"></div>
  <div class="choices" id="choices"></div>
  <div class="answer-bar">
    <div class="answer-bar-labels"><span>回答状況</span><span id="ans-bar-label">0人</span></div>
    <div class="answer-bar-track"><div class="answer-bar-fill" id="ans-bar-fill" style="width:0%"></div></div>
  </div>
  <div class="controls">
    <button class="btn" onclick="hostReveal()">正解を表示</button>
  </div>
</div>

<div id="screen-reveal" class="screen">
  <div class="header">
    <span class="header-label" id="reveal-label">問題 1 — 正解発表</span>
    <span class="header-status"></span>
  </div>
  <div class="question-text" id="reveal-question"></div>
  <div class="choices" id="reveal-choices"></div>
  <div class="explanation" id="explanation"></div>
  <div class="controls">
    <button class="btn" onclick="hostLeaderboard()">順位表を表示</button>
  </div>
</div>

<div id="screen-leaderboard" class="screen">
  <div class="header">
    <span class="header-label" id="lb-label">順位表</span>
    <span class="header-status"></span>
  </div>
  <div class="lb" id="lb"></div>
  <div class="controls" id="lb-controls"></div>
</div>

<div id="screen-finished" class="screen">
  <div class="header">
    <span class="header-label">最終結果</span>
    <span class="header-status"></span>
  </div>
  <div class="winner">
    <div class="winner-label">優勝</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-score" id="winner-score"></div>
  </div>
  <div class="lb" id="final-lb"></div>
  <div class="controls">
    <button class="btn secondary" onclick="hostReset()">最初からやり直す</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwQqLYTKPc-Pg-faoiVETZ5GTjKkZqThLFaxP4bEr4VRPzHIKC7XBMgFQKd0HPUyneA/exec';
const TIMER_SEC = 15;
const LABELS = ['A','B','C','D'];

let questions = [];
let qIndex = 0;
let timerInterval = null;
let timeLeft = TIMER_SEC;
let answerCount = 0;
let totalPlayers = 0;
let hostKey = '';
let ranking = [];

function setScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function verifyKey() {
  const input =document.getElementById('key-input').value.trim();
  const err = document.getElementById('key-err');
  err.textContent = '';
  try {
    const res = await fetch(`${GAS_URL}?type=state&referer=${location.origin}`);
    const data = await res.json();
    if (input === data.hostKey) {
      hostKey = input;
      await loadQuestions();
      setScreen('screen-waiting');
    } else {
      err.textContent = 'キーが違います。入力:「${input}」取得:「${data.hostKey}」';
    }
  } catch(e) {
    err.textContent = '接続に失敗しました';
  }
}

async function loadQuestions() {
  const res = await fetch(`${GAS_URL}?type=questions&referer=${location.origin}`);
  questions = await res.json();
}

async function postState(phase, idx) {
  const body = JSON.stringify({ action: 'setState', phase, qIndex: idx, referer: location.origin });
  console.log('postState:', body);
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body,
  });
  const text = await res.text();
  console.log('postState response:', text);
}
  
async function hostStart() {
  qIndex = 0;
  await postState('question', 0);
  showQuestion();
}

function showQuestion() {
  const q = questions[qIndex];
  answerCount = 0;
  document.getElementById('q-label').textContent = `問題 ${qIndex+1} / ${questions.length}`;
  document.getElementById('q-num').textContent = `Q${qIndex+1}`;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('question-text').textContent = q.question;
  document.getElementById('ans-count').textContent = '0';
  document.getElementById('ans-bar-fill').style.width = '0%';
  document.getElementById('ans-bar-label').textContent = '0人';
  document.getElementById('choices').innerHTML = q.choices.map((c,i) =>
    `<div class="choice"><div class="choice-label">${LABELS[i]}</div>${c}</div>`
  ).join('');
  setScreen('screen-question');
  startTimer();
  pollAnswers();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIMER_SEC;
  updateTimer();
  timerInterval = setInterval(() => {
    timeLeft -= 0.25;
    if (timeLeft <= 0) {
      timeLeft = 0;
      clearInterval(timerInterval);
    }
    updateTimer();
  }, 250);
}

function updateTimer() {
  const el = document.getElementById('timer');
  el.textContent = Math.ceil(timeLeft);
  el.style.color = timeLeft > 8 ? '#fff' : timeLeft > 4 ? '#fbbf24' : '#ef4444';
}

function pollAnswers() {
  const poll = setInterval(async () => {
    if (document.getElementById('screen-question').classList.contains('active')) {
      try {
        const res = await fetch(`${GAS_URL}?type=ranking`);
        const data = await res.json();
        const count = data.filter(p => p.qIndex === qIndex).length;
        document.getElementById('ans-count').textContent = count;
        const pct = totalPlayers > 0 ? Math.round(count / totalPlayers * 100) : 0;
        document.getElementById('ans-bar-fill').style.width = pct + '%';
        document.getElementById('ans-bar-label').textContent = `${count}人`;
      } catch(e) {}
    } else {
      clearInterval(poll);
    }
  }, 2000);
}

async function hostReveal() {
  clearInterval(timerInterval);
  await postState('reveal', qIndex);
  const q = questions[qIndex];
  document.getElementById('reveal-label').textContent = `問題 ${qIndex+1} — 正解発表`;
  document.getElementById('reveal-question').textContent = q.question;
  document.getElementById('reveal-choices').innerHTML = q.choices.map((c,i) =>
    `<div class="choice ${i===q.answer?'correct':'wrong'}"><div class="choice-label">${LABELS[i]}</div>${c}</div>`
  ).join('');
  document.getElementById('explanation').textContent = q.explanation;
  setScreen('screen-reveal');
}

async function hostLeaderboard() {
  await postState('leaderboard', qIndex);
  try {
    const res = await fetch(`${GAS_URL}?type=ranking`);
    ranking = await res.json();
  } catch(e) { ranking = []; }
  const isLast = qIndex >= questions.length - 1;
  document.getElementById('lb-label').textContent = `順位表 — 問題${qIndex+1}終了後`;
  document.getElementById('lb').innerHTML = ranking.map((p,i) =>
    `<div class="lb-row">
      <div class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
      <div class="lb-name">${p.name}</div>
      <div class="lb-score">${p.score}</div>
    </div>`
  ).join('');
  document.getElementById('lb-controls').innerHTML = isLast
    ? `<button class="btn" onclick="hostFinish()">最終結果を表示</button>`
    : `<button class="btn" onclick="hostNext()">次の問題へ</button>`;
  setScreen('screen-leaderboard');
}

async function hostNext() {
  qIndex++;
  await postState('question', qIndex);
  showQuestion();
}

async function hostFinish() {
  await postState('finished', qIndex);
  const top = ranking[0] || {};
  document.getElementById('winner-name').textContent = top.name || '-';
  document.getElementById('winner-score').textContent = (top.score || 0) + ' pt';
  document.getElementById('final-lb').innerHTML = ranking.map((p,i) =>
    `<div class="lb-row">
      <div class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
      <div class="lb-name">${p.name}</div>
      <div class="lb-score">${p.score}</div>
    </div>`
  ).join('');
  setScreen('screen-finished');
}

async function hostReset() {
  await postState('waiting', 0);
  setScreen('screen-waiting');
}
</script>
</body>
</html>
